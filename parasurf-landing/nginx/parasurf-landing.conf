# =============================================
# Nginx — Instituto ParaSurf LANDING PAGE
# Domínio: parasurf.streetonline.com.br
# App porta: 3016
# =============================================

server {
    listen 80;
    server_name parasurf.streetonline.com.br;

    # Redirecionar para HTTPS quando tiver SSL (descomente após certbot):
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass         http://127.0.0.1:3016;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Fallback para SPA (single file)
        try_files $uri $uri/ @proxy;
    }

    location @proxy {
        proxy_pass http://127.0.0.1:3016;
    }

    # Cache agressivo para assets estáticos
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf)$ {
        proxy_pass http://127.0.0.1:3016;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options nosniff;
    }

    # Segurança
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # Gzip
    gzip on;
    gzip_types text/html text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    access_log /var/log/nginx/parasurf-landing-access.log;
    error_log  /var/log/nginx/parasurf-landing-error.log;
}

